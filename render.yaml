# Render Blueprint — provisions the API, Redis, and Postgres in one deploy.
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub → Render Dashboard → New → Blueprint → pick repo.
# Render reads this file, creates all three services, and wires the env vars below.

services:
  - type: web
    name: ox-arena-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    region: oregon
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret once, then keeps it.
      - key: CORS_ORIGIN
        value: "*"
      - key: REDIS_URL
        fromService:
          type: redis
          name: ox-arena-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: ox-arena-db
          property: connectionString

  - type: redis
    name: ox-arena-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction # matchmaking/presence must not be evicted
    ipAllowList: [] # only reachable from Render services

databases:
  - name: ox-arena-db
    plan: free
    region: oregon
    databaseName: oxarena
    postgresMajorVersion: "16"
