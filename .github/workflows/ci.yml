name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck, tests, smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      # npm install (not ci): lockfile is generated on Windows and npm's
      # cross-platform optional-deps bug breaks strict ci on Linux runners.
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (engine)
        run: npm test
      - name: End-to-end smoke (matchmaking + full game)
        run: npm run smoke
      - name: Production build
        run: npm run build

  android:
    name: Android — build + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ox-arena-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
